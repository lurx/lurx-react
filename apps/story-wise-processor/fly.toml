# Fly.io configuration
# Deploy: fly launch --no-deploy && fly secrets set R2_ACCESS_KEY_ID=xxx ... && fly deploy

app = "story-wise-processor"
primary_region = "iad"

[build]
  dockerfile = "Dockerfile"

[env]
  PORT = "3001"
  NODE_ENV = "production"

[http_service]
  internal_port = 3001
  force_https = true
  auto_stop_machines = true
  auto_start_machines = true
  min_machines_running = 0

[[vm]]
  cpu_kind = "shared"
  cpus = 1
  memory_mb = 512

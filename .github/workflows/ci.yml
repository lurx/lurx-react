name: CI

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  actions: read
  contents: read

jobs:
  main:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'yarn'

      - run: |
          for i in {1..3}; do
            yarn install --frozen-lockfile && break
            echo "Retrying yarn install... ($i)"
            sleep 5
          done

      - uses: nrwl/nx-set-shas@v4

      - run: npx nx affected -t lint test build

# Deploy story-wise-processor to Railway when it changes on main.
#
# Setup (GitHub → Settings → Secrets and variables → Actions):
# - RAILWAY_TOKEN = Project Token from the Railway project that contains the processor
#   (Railway → that project → Settings → Tokens → Create Project Token).
#   Must be from the same project as the "story-wise" service.
# - RAILWAY_SERVICE_ID = ID of the service that runs the processor (named "story-wise")
#   → Railway → that service → Settings, or from the service URL
#
# Deploys to environment "production". Root for the service: apps/story-wise-processor

name: Deploy processor

on:
  push:
    branches: [main]
    paths:
      - 'apps/story-wise-processor/**'
  workflow_dispatch:

concurrency:
  group: deploy-processor
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Deploy to Railway
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
          RAILWAY_SERVICE_ID: ${{ secrets.RAILWAY_SERVICE_ID }}
        run: |
          cd apps/story-wise-processor
          if [ -z "$RAILWAY_TOKEN" ]; then
            echo "::error::RAILWAY_TOKEN is not set. Add it in GitHub → Settings → Secrets and variables → Actions. See apps/story-wise-processor/GITHUB_SECRETS.md"
            exit 1
          fi
          if [ -z "$RAILWAY_SERVICE_ID" ]; then
            echo "::error::RAILWAY_SERVICE_ID is not set. Add it in GitHub → Settings → Secrets and variables → Actions. See apps/story-wise-processor/GITHUB_SECRETS.md"
            exit 1
          fi
          npx -y @railway/cli up --detach --service "$RAILWAY_SERVICE_ID" --environment production --verbose
        continue-on-error: false
